name: Build Sekta

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-server:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Server
        run: dotnet restore src/Sekta.Server/Sekta.Server.csproj

      - name: Build Server
        run: dotnet build src/Sekta.Server/Sekta.Server.csproj -c Release --no-restore

      - name: Publish Server (win-x64)
        run: |
          dotnet publish src/Sekta.Server/Sekta.Server.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o publish/server

      - name: Upload Server artifact
        uses: actions/upload-artifact@v3
        with:
          name: sekta-server-win-x64
          path: publish/server/

  build-client:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Client (Windows only)
        run: dotnet restore src/Sekta.Client/Sekta.Client.csproj -p:CiTargetFramework=net9.0-windows10.0.19041.0

      - name: Build Client
        run: dotnet build src/Sekta.Client/Sekta.Client.csproj -f net9.0-windows10.0.19041.0 -c Release --no-restore -p:CiTargetFramework=net9.0-windows10.0.19041.0

      - name: Publish Client (win-x64)
        run: |
          dotnet publish src/Sekta.Client/Sekta.Client.csproj `
            -f net9.0-windows10.0.19041.0 `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:WindowsPackageType=None `
            -p:CiTargetFramework=net9.0-windows10.0.19041.0 `
            -o publish/client

      - name: Upload Client artifact
        uses: actions/upload-artifact@v3
        with:
          name: sekta-client-win-x64
          path: publish/client/

  build-android-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Client (Android only)
        run: dotnet restore src/Sekta.Client/Sekta.Client.csproj -p:CiTargetFramework=net9.0-android

      - name: Build Android APK (x64)
        run: |
          dotnet publish src/Sekta.Client/Sekta.Client.csproj `
            -f net9.0-android `
            -c Release `
            -r android-x64 `
            -p:CiTargetFramework=net9.0-android `
            -p:AndroidPackageFormat=apk `
            -o publish/android-x64

      - name: Upload Android x64 artifact
        uses: actions/upload-artifact@v3
        with:
          name: sekta-client-android-x64
          path: publish/android-x64/**/*.apk

  build-android-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore Client (Android only)
        run: dotnet restore src/Sekta.Client/Sekta.Client.csproj -p:CiTargetFramework=net9.0-android

      - name: Build Android APK (arm64)
        run: |
          dotnet publish src/Sekta.Client/Sekta.Client.csproj `
            -f net9.0-android `
            -c Release `
            -r android-arm64 `
            -p:CiTargetFramework=net9.0-android `
            -p:AndroidPackageFormat=apk `
            -o publish/android-arm64

      - name: Upload Android arm64 artifact
        uses: actions/upload-artifact@v3
        with:
          name: sekta-client-android-arm64
          path: publish/android-arm64/**/*.apk
